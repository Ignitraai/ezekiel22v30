<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 400px; height: 400px; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
.container {
  width: 400px;
  height: 400px;
  background: linear-gradient(135deg, #4A2060 0%, #2E1040 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.book-cover {
  width: 280px;
  height: 380px;
  background: white;
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
}
.title {
  font-size: 28px;
  font-weight: bold;
  color: #4A2060;
  line-height: 1.2;
  margin-bottom: 12px;
}
.subtitle {
  font-size: 14px;
  color: #C9A96E;
  font-style: italic;
  margin-bottom: 20px;
}
.cross {
  font-size: 40px;
  color: #C9A96E;
  margin-bottom: 20px;
}
.scripture {
  font-size: 11px;
  color: #6B6B6B;
  line-height: 1.4;
  border-top: 1px solid #C9A96E;
  padding-top: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="book-cover">
    <div class="cross">✝</div>
    <div class="title">THE GREAT PRETENCE</div>
    <div class="subtitle">A Call to Love That Costs Something</div>
    <div class="scripture">"I looked for someone to stand in the gap... I found no one. Not one."<br>Ezekiel 22:30</div>
  </div>
</div>
</body>
</html>
