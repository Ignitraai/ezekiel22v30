<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; font-family: Georgia, 'Times New Roman', serif; }
.container {
  width: 1080px;
  height: 1080px;
  background: linear-gradient(135deg, #4A2060 0%, #2E1040 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.border {
  position: absolute;
  top: 30px;
  left: 30px;
  right: 30px;
  bottom: 30px;
  border: 2px solid rgba(201,169,110,0.4);
  border-radius: 8px;
}
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: absolute;
  width: 40px;
  height: 40px;
  border-color: #C9A96E;
  border-style: solid;
}
.corner-tl { top: 20px; left: 20px; border-width: 3px 0 0 3px; }
.corner-tr { top: 20px; right: 20px; border-width: 3px 3px 0 0; }
.corner-bl { bottom: 20px; left: 20px; border-width: 0 0 3px 3px; }
.corner-br { bottom: 20px; right: 20px; border-width: 0 3px 3px 0; }
.content {
  text-align: center;
  padding: 80px;
  position: relative;
  z-index: 1;
  max-width: 900px;
}
.quote {
  font-size: 48px;
  color: white;
  font-style: italic;
  line-height: 1.5;
  margin-bottom: 40px;
}
.quote::before { content: '\201C'; color: #C9A96E; font-size: 72px; display: block; margin-bottom: 10px; }
.quote::after { content: '\201D'; color: #C9A96E; font-size: 72px; display: block; margin-top: 10px; }
.reference {
  font-size: 24px;
  color: #C9A96E;
  margin-bottom: 40px;
}
.divider {
  width: 100px;
  height: 2px;
  background: #C9A96E;
  margin: 0 auto 40px;
}
.site-name {
  font-size: 20px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.url {
  font-size: 18px;
  color: rgba(255,255,255,0.4);
  margin-top: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="border"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>
  <div class="content">
    <div class="quote">[YOUR QUOTE HERE]</div>
    <div class="reference">— Chapter Reference</div>
    <div class="divider"></div>
    <div class="site-name">The Great Pretence</div>
    <div class="url">ezekiel22v30.vercel.app</div>
  </div>
</div>
</body>
</html>
